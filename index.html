     不需要修改這段，除非你想更改事件名稱
============================================================ -->
<script>
  function trackClick(buttonName) {
    // GA4 事件
    if (typeof gtag !== 'undefined') {
      gtag('event', 'link_click', {
        'button_name': buttonName
      });
    }
    // Meta Pixel 事件
    if (typeof fbq !== 'undefined') {
      fbq('track', 'Lead', { content_name: buttonName });
    }
  }
</script>
